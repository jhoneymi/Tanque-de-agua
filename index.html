<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>⚡ Reactor Dinámico · Cálculo Diferencial</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ----- RESET Y BASE ----- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body {
      background: #0c1624;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background-image: radial-gradient(circle at 20% 30%, #1a2a40 0%, #0a111d 80%);
    }

    /* contenedor principal glassmorphism */
    .app-container {
      max-width: 1440px;
      width: 100%;
      background: rgba(18, 30, 48, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 56px;
      padding: 22px 28px 32px;
      border: 1px solid rgba(120, 180, 255, 0.15);
      box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(80, 160, 255, 0.08) inset;
      transition: all 0.2s;
    }

    /* ----- HEADER futurista ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(100, 180, 255, 0.15);
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a0d0ff, #4d8fd9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 30px rgba(60, 150, 255, 0.2);
    }
    .header h1 small {
      font-size: 0.9rem;
      font-weight: 400;
      background: rgba(255,255,255,0.06);
      padding: 4px 16px;
      border-radius: 60px;
      -webkit-text-fill-color: #8ab4e6;
      border: 1px solid rgba(100, 180, 255, 0.2);
    }
    .status-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0, 20, 40, 0.5);
      padding: 6px 18px 6px 14px;
      border-radius: 60px;
      border: 1px solid rgba(80, 180, 255, 0.2);
      backdrop-filter: blur(4px);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3acf7a;
      box-shadow: 0 0 16px #3acf7a;
      transition: 0.25s;
    }
    .status-dot.paused { background: #f1c40f; box-shadow: 0 0 16px #f1c40f; }
    .status-dot.stopped { background: #e74c5e; box-shadow: 0 0 16px #e74c5e; }
    .status-text { color: #b6d6f5; font-weight: 500; letter-spacing: 0.3px; }

    /* ----- LAYOUT PRINCIPAL (game-dashboard) ----- */
    .dashboard {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 24px;
      margin-top: 8px;
    }

    .left-panel {
      flex: 1.2 1 380px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .right-panel {
      flex: 1.8 1 480px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ----- TANQUE (canvas + skins) ----- */
    .tank-card {
      background: rgba(12, 26, 44, 0.6);
      backdrop-filter: blur(6px);
      border-radius: 40px;
      padding: 18px 18px 14px;
      border: 1px solid rgba(80, 180, 255, 0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: 0.2s;
    }
    .tank-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .skin-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .skin-btn {
      background: rgba(30, 60, 100, 0.3);
      border: 1px solid rgba(100, 180, 255, 0.15);
      color: #9ac2ed;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      backdrop-filter: blur(4px);
    }
    .skin-btn:hover { background: rgba(60, 140, 220, 0.3); transform: scale(1.02); }
    .skin-btn.active { background: rgba(60, 160, 255, 0.25); border-color: #5a9eff; color: #c6e2ff; box-shadow: 0 0 20px rgba(60, 150, 255, 0.15); }
    canvas#tankCanvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 300 / 280;
      border-radius: 28px;
      background: #0d1b2b;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
      touch-action: none;
      image-rendering: auto;
    }

    /* ----- CONTROLES GAME ----- */
    .controls-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      background: rgba(8, 20, 38, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 16px 22px;
      border: 1px solid rgba(80, 180, 255, 0.08);
      align-items: center;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-game {
      background: rgba(30, 60, 100, 0.25);
      border: 1px solid rgba(100, 180, 255, 0.12);
      padding: 8px 18px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #b4d6ff;
      cursor: pointer;
      transition: all 0.12s;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-game:hover { background: rgba(60, 140, 220, 0.25); transform: scale(0.96); }
    .btn-game.primary { background: #1b6bb0; border-color: #3f9eff; color: white; box-shadow: 0 0 20px rgba(40, 140, 255, 0.2); }
    .btn-game.primary:hover { background: #2a7ec9; }
    .btn-game.danger { background: #b03a4a; border-color: #e06a7a; color: white; }
    .btn-game.danger:hover { background: #c94a5a; }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 8px 16px;
      flex-wrap: wrap;
      margin-left: auto;
    }
    .slider-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.2);
      padding: 4px 12px 4px 8px;
      border-radius: 60px;
      border: 1px solid rgba(100, 180, 255, 0.06);
    }
    .slider-item label { color: #8bb6e6; font-size: 0.75rem; font-weight: 500; }
    .slider-item input[type="range"] {
      width: 80px;
      accent-color: #4a9eff;
      background: #1a3450;
      height: 4px;
      border-radius: 10px;
    }
    .slider-item span { color: #c6e2ff; font-size: 0.8rem; min-width: 28px; }

    /* modo selector */
    .mode-selector {
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.25);
      padding: 4px 8px;
      border-radius: 60px;
      border: 1px solid rgba(100, 180, 255, 0.06);
    }
    .mode-btn {
      background: transparent;
      border: none;
      color: #7aa3cc;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
    }
    .mode-btn.active { background: rgba(60, 150, 255, 0.2); color: #c6e2ff; }

    /* ----- DATOS (widgets) ----- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      background: rgba(8, 20, 38, 0.4);
      backdrop-filter: blur(6px);
      border-radius: 32px;
      padding: 16px 18px;
      border: 1px solid rgba(80, 180, 255, 0.06);
    }
    .stat-item {
      background: rgba(0, 15, 35, 0.3);
      border-radius: 28px;
      padding: 10px 14px;
      border-left: 3px solid #3f8edb;
      backdrop-filter: blur(4px);
    }
    .stat-item .label { font-size: 0.6rem; text-transform: uppercase; color: #7fa8d4; letter-spacing: 0.5px; }
    .stat-item .value { font-size: 1.3rem; font-weight: 700; color: #d0eaff; line-height: 1.3; }
    .stat-item .value small { font-size: 0.7rem; color: #7fa8d4; margin-left: 4px; }

    /* ----- GRÁFICA futurista ----- */
    .chart-card {
      background: rgba(8, 20, 38, 0.4);
      backdrop-filter: blur(6px);
      border-radius: 40px;
      padding: 14px 14px 8px;
      border: 1px solid rgba(80, 180, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .chart-card canvas { width: 100% !important; height: auto !important; max-height: 220px; }

    /* ----- PANEL EDUCATIVO (interpretación) ----- */
    .edu-panel {
      background: rgba(8, 20, 38, 0.3);
      backdrop-filter: blur(6px);
      border-radius: 28px;
      padding: 12px 20px;
      border: 1px solid rgba(80, 180, 255, 0.05);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 24px;
      margin-top: 4px;
    }
    .edu-text {
      color: #b0cef0;
      font-size: 0.9rem;
      font-weight: 400;
      flex: 2 1 200px;
    }
    .edu-text strong { color: #9ac9ff; }
    .edu-equation {
      background: rgba(0, 10, 30, 0.3);
      padding: 4px 18px;
      border-radius: 60px;
      font-family: 'Courier New', monospace;
      color: #7fc2ff;
      border: 1px solid rgba(80, 180, 255, 0.08);
      font-size: 0.9rem;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 850px) {
      .app-container { padding: 16px; }
      .dashboard { flex-direction: column; }
      .controls-panel { flex-direction: column; align-items: stretch; }
      .slider-group { margin-left: 0; justify-content: center; }
      .header h1 { font-size: 1.4rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .btn-group .btn-game { font-size: 0.75rem; padding: 6px 12px; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <!-- HEADER -->
  <div class="header">
    <h1>⚡ REACTOR DINÁMICO <small>derivada · tasa de cambio</small></h1>
    <div class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">⏸ en pausa</span>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <!-- COLUMNA IZQUIERDA -->
    <div class="left-panel">
      <!-- TANQUE + SKINS -->
      <div class="tank-card">
        <div class="tank-header">
          <div class="skin-selector">
            <button class="skin-btn active" data-skin="industrial">🛢 Industrial</button>
            <button class="skin-btn" data-skin="futurista">🧪 Futurista</button>
            <button class="skin-btn" data-skin="espacial">🚀 Espacial</button>
            <button class="skin-btn" data-skin="arcade">🎮 Arcade</button>
          </div>
          <span style="color:#8ab4e6; font-size:0.8rem;" id="levelPercent">0%</span>
        </div>
        <canvas id="tankCanvas" width="300" height="280"></canvas>
      </div>

      <!-- CONTROLES -->
      <div class="controls-panel">
        <div class="btn-group">
          <button class="btn-game primary" id="startBtn">▶ Iniciar</button>
          <button class="btn-game" id="pauseBtn">⏸ Pausar</button>
          <button class="btn-game danger" id="resetBtn">⟲ Reiniciar</button>
        </div>
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="constante">Constante</button>
          <button class="mode-btn" data-mode="variable">Variable</button>
          <button class="mode-btn" data-mode="libre">Libre</button>
        </div>
        <div class="slider-group">
          <div class="slider-item"><label>⏱</label><input type="range" id="speedSlider" min="0.2" max="3.0" step="0.1" value="1.2"><span id="speedLabel">1.2</span></div>
          <div class="slider-item"><label>⬆</label><input type="range" id="inflowSlider" min="0" max="3.0" step="0.1" value="1.4"><span id="inflowLabel">1.4</span></div>
          <div class="slider-item"><label>⬇</label><input type="range" id="outflowSlider" min="0" max="3.0" step="0.1" value="0.6"><span id="outflowLabel">0.6</span></div>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-item"><div class="label">Volumen</div><div class="value" id="volDisplay">5.0 <small>L</small></div></div>
        <div class="stat-item"><div class="label">Tiempo</div><div class="value" id="timeDisplay">0.0 <small>s</small></div></div>
        <div class="stat-item"><div class="label">Tasa dV/dt</div><div class="value" id="derivDisplay">0.00 <small>L/s</small></div></div>
        <div class="stat-item"><div class="label">Flujo neto</div><div class="value" id="flowDisplay">0.0 <small>L/s</small></div></div>
      </div>
    </div>

    <!-- COLUMNA DERECHA -->
    <div class="right-panel">
      <!-- GRÁFICA -->
      <div class="chart-card">
        <canvas id="volumeChart"></canvas>
      </div>
      <!-- PANEL EDUCATIVO -->
      <div class="edu-panel">
        <div class="edu-text" id="eduText">💡 El tanque está en equilibrio inicial.</div>
        <div class="edu-equation" id="eduEquation">dV/dt = Q_in - Q_out</div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- ELEMENTOS DOM ----
    const canvas = document.getElementById('tankCanvas');
    const ctx = canvas.getContext('2d');
    const levelPercentSpan = document.getElementById('levelPercent');
    const volDisplay = document.getElementById('volDisplay');
    const timeDisplay = document.getElementById('timeDisplay');
    const derivDisplay = document.getElementById('derivDisplay');
    const flowDisplay = document.getElementById('flowDisplay');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const eduText = document.getElementById('eduText');
    const eduEquation = document.getElementById('eduEquation');

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const inflowSlider = document.getElementById('inflowSlider');
    const outflowSlider = document.getElementById('outflowSlider');
    const inflowLabel = document.getElementById('inflowLabel');
    const outflowLabel = document.getElementById('outflowLabel');

    const skinBtns = document.querySelectorAll('.skin-btn');
    const modeBtns = document.querySelectorAll('.mode-btn');

    // ---- ESTADO ----
    const STATE = {
      running: false,
      paused: false,
      time: 0,
      volume: 5.0,
      maxVolume: 20,
      minVolume: 0,
      inflow: 1.4,
      outflow: 0.6,
      history: [],
      maxHistory: 140,
      lastTimestamp: 0,
      speedMultiplier: 1.2,
      derivBuffer: [],
      skin: 'industrial',
      mode: 'constante', // constante, variable, libre
      timeAcc: 0,
    };

    // ---- CHART ----
    const chartCtx = document.getElementById('volumeChart').getContext('2d');
    let chart = new Chart(chartCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Volumen (L)',
          data: [],
          borderColor: '#5a9eff',
          backgroundColor: 'rgba(40, 140, 255, 0.12)',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { display: false }, tooltip: { enabled: true, mode: 'index', intersect: false } },
        scales: {
          x: { grid: { color: 'rgba(80,180,255,0.05)' }, ticks: { color: '#7fa8d4' } },
          y: { min: 0, max: 22, grid: { color: 'rgba(80,180,255,0.05)' }, ticks: { color: '#7fa8d4' } }
        },
        animation: false,
        interaction: { intersect: false, mode: 'index' }
      }
    });

    // ---- SKINS ----
    function drawTank(volume, skin) {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const level = Math.min(1, Math.max(0, volume / STATE.maxVolume));
      const waterH = 40 + level * 200;
      const waterY = 240 - waterH;

      // fondo tanque según skin
      ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(0,0,0,0.3)';
      if (skin === 'industrial') {
        ctx.fillStyle = '#1a2d44'; ctx.strokeStyle = '#3f7eb0'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(30, 20, 240, 230, 20); ctx.fill(); ctx.stroke();
        // remaches
        for (let i=0; i<6; i++) { ctx.beginPath(); ctx.arc(45, 30+i*40, 5, 0, 2*Math.PI); ctx.fillStyle='#3f6a8a'; ctx.fill(); }
        for (let i=0; i<6; i++) { ctx.beginPath(); ctx.arc(255, 30+i*40, 5, 0, 2*Math.PI); ctx.fill(); }
      } else if (skin === 'futurista') {
        ctx.fillStyle = '#0e1f30'; ctx.strokeStyle = '#5ac8fa'; ctx.lineWidth = 2;
        ctx.shadowColor = '#5ac8fa40'; ctx.shadowBlur = 30;
        ctx.beginPath(); ctx.roundRect(30, 20, 240, 230, 30); ctx.fill(); ctx.stroke();
        // líneas glitch
        ctx.strokeStyle = '#5ac8fa20'; ctx.lineWidth = 1;
        for (let i=0; i<8; i++) { ctx.beginPath(); ctx.moveTo(40, 30+i*28); ctx.lineTo(260, 30+i*28); ctx.stroke(); }
      } else if (skin === 'espacial') {
        ctx.fillStyle = '#0a1420'; ctx.strokeStyle = '#b48c5c'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.roundRect(30, 20, 240, 230, 12); ctx.fill(); ctx.stroke();
        // escudos
        ctx.fillStyle = '#b48c5c20'; ctx.beginPath(); ctx.arc(150, 40, 30, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#b48c5c10'; ctx.beginPath(); ctx.arc(150, 230, 30, 0, Math.PI*2); ctx.fill();
      } else if (skin === 'arcade') {
        ctx.fillStyle = '#1a1a2e'; ctx.strokeStyle = '#f7d44a'; ctx.lineWidth = 4;
        ctx.shadowColor = '#f7d44a60'; ctx.shadowBlur = 20;
        ctx.beginPath(); ctx.roundRect(30, 20, 240, 230, 8); ctx.fill(); ctx.stroke();
        // pixel dots
        for (let x=40; x<260; x+=20) { for (let y=30; y<240; y+=20) { ctx.fillStyle='#f7d44a15'; ctx.beginPath(); ctx.arc(x,y,2,0,2*Math.PI); ctx.fill(); } }
      }
      ctx.shadowBlur = 0;

      // AGUA (con ondas y brillo)
      const grad = ctx.createLinearGradient(40, waterY, 40, 240);
      grad.addColorStop(0, '#3f9eff');
      grad.addColorStop(0.6, '#1a6bb0');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(40, waterY, 220, 240 - waterY, 14);
      ctx.fill();

      // ondas (animación simple con time)
      const waveOffset = (STATE.time * 1.8) % 20;
      ctx.fillStyle = 'rgba(255,255,255,0.07)';
      for (let i=0; i<6; i++) {
        const yOff = waterY + 16 + i*28 + Math.sin(STATE.time*1.2 + i)*4;
        ctx.beginPath();
        ctx.ellipse(80 + i*30 + Math.sin(STATE.time*0.7 + i*2)*6, yOff, 30, 6, 0, 0, Math.PI*2);
        ctx.fill();
      }
      // burbujas
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (let i=0; i<8; i++) {
        const bx = 60 + (i*27 + STATE.time*5) % 200;
        const by = waterY + 30 + (i*23 + STATE.time*3) % 180;
        ctx.beginPath(); ctx.arc(bx, by, 2+Math.sin(i+STATE.time)*1.5, 0, Math.PI*2); ctx.fill();
      }
      // reflejo
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.roundRect(60, waterY+20, 40, 20, 10); ctx.fill();

      // borde superior agua
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(44, waterY+6); ctx.lineTo(256, waterY+6); ctx.stroke();
    }

    // helper roundRect
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      if (w < 2*r) r = w/2; if (h < 2*r) r = h/2;
      this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y);
      this.closePath(); return this;
    };

    // ---- UPDATE UI ----
    function updateUI() {
      const vol = STATE.volume;
      const pct = (vol / STATE.maxVolume * 100).toFixed(1);
      levelPercentSpan.textContent = pct + '%';
      volDisplay.innerHTML = vol.toFixed(2) + ' <small>L</small>';
      timeDisplay.innerHTML = STATE.time.toFixed(1) + ' <small>s</small>';
      const net = STATE.inflow - STATE.outflow;
      flowDisplay.innerHTML = net.toFixed(2) + ' <small>L/s</small>';
      const deriv = computeDerivative();
      derivDisplay.innerHTML = deriv.toFixed(3) + ' <small>L/s</small>';

      // status
      if (STATE.running && !STATE.paused) {
        statusDot.className = 'status-dot';
        statusText.textContent = '▶ en vivo';
      } else if (STATE.paused) {
        statusDot.className = 'status-dot paused';
        statusText.textContent = '⏸ pausa';
      } else {
        statusDot.className = 'status-dot stopped';
        statusText.textContent = '⏹ detenido';
      }

      // texto educativo
      let msg = '';
      if (Math.abs(deriv) < 0.02) msg = '⚖️ El volumen se mantiene estable. La derivada es cercana a cero (equilibrio).';
      else if (deriv > 0) msg = `📈 El volumen está aumentando (dV/dt = ${deriv.toFixed(2)}). El flujo de entrada supera al de salida.`;
      else msg = `📉 El volumen está disminuyendo (dV/dt = ${deriv.toFixed(2)}). El flujo de salida supera al de entrada.`;
      eduText.innerHTML = '💡 ' + msg;
      eduEquation.textContent = `dV/dt = ${deriv.toFixed(3)} L/s  ·  Q_in = ${STATE.inflow.toFixed(1)}  Q_out = ${STATE.outflow.toFixed(1)}`;

      drawTank(vol, STATE.skin);
      updateChart();
    }

    // ---- DERIVADA ----
    function computeDerivative() {
      const hist = STATE.history;
      if (hist.length < 3) return 0;
      const latest = hist[hist.length-1], prev = hist[hist.length-2];
      if (!latest || !prev) return 0;
      const dt = latest.t - prev.t;
      if (dt < 0.001) return 0;
      const raw = (latest.v - prev.v) / dt;
      STATE.derivBuffer.push(raw);
      if (STATE.derivBuffer.length > 10) STATE.derivBuffer.shift();
      if (STATE.derivBuffer.length === 0) return 0;
      return STATE.derivBuffer.reduce((a,b) => a+b, 0) / STATE.derivBuffer.length;
    }

    // ---- CHART ----
    function updateChart() {
      const hist = STATE.history;
      chart.data.labels = hist.map(p => p.t.toFixed(1));
      chart.data.datasets[0].data = hist.map(p => p.v);
      chart.update('none');
    }

    // ---- SIMULACIÓN ----
    function simulationStep(timestamp) {
      if (!STATE.running || STATE.paused) return;
      if (!STATE.lastTimestamp) STATE.lastTimestamp = timestamp;
      let delta = (timestamp - STATE.lastTimestamp) / 1000;
      STATE.lastTimestamp = timestamp;
      if (delta > 0.08) delta = 0.08;
      delta *= STATE.speedMultiplier;

      // modo variable: flujo sinusoidal
      if (STATE.mode === 'variable') {
        STATE.inflow = 1.2 + 0.6 * Math.sin(STATE.time * 0.3);
        STATE.outflow = 0.7 + 0.4 * Math.sin(STATE.time * 0.2 + 1.2);
        inflowSlider.value = STATE.inflow; inflowLabel.textContent = STATE.inflow.toFixed(1);
        outflowSlider.value = STATE.outflow; outflowLabel.textContent = STATE.outflow.toFixed(1);
      } else if (STATE.mode === 'libre') {
        // se maneja por sliders, nada extra
      }

      let dv = (STATE.inflow - STATE.outflow) * delta;
      STATE.volume = Math.min(STATE.maxVolume, Math.max(STATE.minVolume, STATE.volume + dv));
      STATE.time += delta;

      if (STATE.history.length === 0 || (STATE.time - STATE.history[STATE.history.length-1].t) > 0.12) {
        STATE.history.push({ t: STATE.time, v: STATE.volume });
        if (STATE.history.length > STATE.maxHistory) STATE.history.shift();
      }
      updateUI();
    }

    let animationId = null;
    function animate(timestamp) {
      if (STATE.running) simulationStep(timestamp);
      animationId = requestAnimationFrame(animate);
    }

    // ---- CONTROLES ----
    function startSimulation() {
      if (STATE.running && !STATE.paused) return;
      if (!STATE.running) {
        STATE.running = true; STATE.paused = false;
        STATE.lastTimestamp = 0;
        if (STATE.history.length === 0) STATE.history.push({ t: 0, v: STATE.volume });
        if (!animationId) animationId = requestAnimationFrame(animate);
      } else if (STATE.paused) {
        STATE.paused = false;
        STATE.lastTimestamp = 0;
      }
      updateUI();
    }
    function pauseSimulation() { if (STATE.running && !STATE.paused) { STATE.paused = true; updateUI(); } }
    function resetSimulation() {
      STATE.running = false; STATE.paused = false;
      if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      STATE.time = 0; STATE.volume = 5.0;
      STATE.history = [{ t: 0, v: 5.0 }];
      STATE.derivBuffer = [];
      STATE.lastTimestamp = 0;
      updateUI();
      chart.data.labels = ['0.0']; chart.data.datasets[0].data = [5.0]; chart.update('none');
    }

    // ---- EVENTOS ----
    startBtn.addEventListener('click', startSimulation);
    pauseBtn.addEventListener('click', pauseSimulation);
    resetBtn.addEventListener('click', resetSimulation);

    speedSlider.addEventListener('input', function() {
      STATE.speedMultiplier = parseFloat(this.value);
      speedLabel.textContent = STATE.speedMultiplier.toFixed(1);
    });
    inflowSlider.addEventListener('input', function() {
      if (STATE.mode === 'libre' || STATE.mode === 'constante') {
        STATE.inflow = parseFloat(this.value);
        inflowLabel.textContent = STATE.inflow.toFixed(1);
      }
    });
    outflowSlider.addEventListener('input', function() {
      if (STATE.mode === 'libre' || STATE.mode === 'constante') {
        STATE.outflow = parseFloat(this.value);
        outflowLabel.textContent = STATE.outflow.toFixed(1);
      }
    });

    // SKINS
    skinBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        skinBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        STATE.skin = this.dataset.skin;
        drawTank(STATE.volume, STATE.skin);
      });
    });

    // MODOS
    modeBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        modeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        STATE.mode = this.dataset.mode;
        if (STATE.mode === 'constante') {
          STATE.inflow = 1.4; STATE.outflow = 0.6;
          inflowSlider.value = 1.4; inflowLabel.textContent = '1.4';
          outflowSlider.value = 0.6; outflowLabel.textContent = '0.6';
        } else if (STATE.mode === 'variable') {
          // se maneja en simulación
        }
        updateUI();
      });
    });

    // ---- INICIO ----
    function init() {
      resetSimulation();
      STATE.inflow = 1.4; STATE.outflow = 0.6;
      inflowSlider.value = 1.4; outflowSlider.value = 0.6;
      updateUI();
    }
    init();

    // exponer para debug
    window.__tank = { STATE };
  })();
</script>
</body>
</html>
